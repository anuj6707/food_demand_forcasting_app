<!DOCTYPE html>
<html lang="en">


<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>


<body>

<div class="container">

    <div class="prediction-card">

      <h1> Food Demand Forecasting</h1>

      <p>Enter the required information below to estimatethe expected number of food orders.</p>

      <form action="{{ url_for('prediction') }}" method="POST">

        <div class="input-group">

          <label>Week Number</label>
              <input type="number" name="week" placeholder="e.g. 25" required>
            </div>

          <div class="input-group">

              <label>Checkout Price</label>
              <input type="number" step="0.01"name="checkout_price"placeholder="e.g. 245"required>

            </div>

            <div class="input-group">

              <label>Base Price</label>
              <input type="number" step="0.01" name="base_price" placeholder="e.g. 300" required>

            </div>

            <div class="input-group">

              <label>Meal ID</label>
              <input type="number" name="meal_id" placeholder="e.g. 1885" required>

            </div>

            <div class="input-group">

                <label>Center ID</label>
                <input type="number" name="center_id" placeholder="e.g. 55" required>
            </div>

            <div class="input-group">
              <label>Homepage Featured</label>
              <select name="homepage_featured">
                <option value="0">No</option>
                <option value="1">Yes</option>
              </select>
            </div>

            <div class="input-group">
              <label>Email Promotion</label>
              <select name="emailer_for_promotion">
                  <option value="0">No</option>
                  <option value="1">Yes</option>
              </select>
            </div>

            <button type="submit">Predict Demand</button>
          </form>

        {% if prediction !=None %}

        <div class="result">
          <h2>Predicted Demand</h2>
          <h1>{{ prediction }} Orders</h1>
          <p>Estimated number of food orders based on theprovided inputs.</p>
        </div>

        {% endif %}
        {% if error %}

                    <div class="error-box">{{ error }}</div>

         {% endif %}


    </div>

</div>

</body>

</html>
